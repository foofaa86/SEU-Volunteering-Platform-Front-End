<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register - SEU Volunteering Platform</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- CSS -->
    <link rel="stylesheet" href="css/style.css">
</head>

<body>

<!-- ================= NAVBAR ================= -->
<nav class="navbar navbar-expand-lg navbar-dark bg-dark px-4">
    <a class="navbar-brand d-flex align-items-center gap-2" href="index.html">
        <img src="assets/Logo.jpg" width="40" alt="Logo">
        <span>SEU Volunteer</span>
    </a>

    <button class="navbar-toggler" data-bs-toggle="collapse" data-bs-target="#navMenu">
        <span class="navbar-toggler-icon"></span>
    </button>

    <div class="collapse navbar-collapse" id="navMenu">
        <ul class="navbar-nav ms-auto gap-3">

            <li class="nav-item">
                <a class="nav-link" href="index.html">Home</a>
            </li>

            <li class="nav-item">
                <a class="nav-link" href="login.html">Login</a>
            </li>

            <li class="nav-item">
                <a class="nav-link active" href="register.html">Register</a>
            </li>

            <li class="nav-item">
                <a class="nav-link" href="student-dashboard.html">Dashboard</a>
            </li>

        </ul>
    </div>
</nav>

<!-- ================= REGISTER SECTION ================= -->
<section class="login-section d-flex align-items-center justify-content-center">

    <div class="login-card" style="width: 450px;">

        <h2 class="text-center mb-3">Create Account</h2>
        <p class="text-center text-muted">Join SEU Volunteering Platform</p>

        <form onsubmit="return registerUser(event)">

            <!-- Full Name -->
            <div class="mb-3">
                <label class="form-label">Full Name</label>
                <input type="text" class="form-control" id="name" placeholder="Enter full name" required>
            </div>

            <!-- Email -->
            <div class="mb-3">
                <label class="form-label">Email</label>
                <input type="email" class="form-control" id="email" placeholder="SEU email" required>
            </div>

            <!-- Password -->
            <div class="mb-3">
                <label class="form-label">Password</label>
                <input type="password" class="form-control" id="password" placeholder="Create password" required>
            </div>

            <!-- Role -->
            <div class="mb-3">
                <label class="form-label">Select Role</label>
                <select class="form-control" id="role" required>
                    <option value="">-- Select Role --</option>
                    <option value="student">Student</option>
                    <option value="agency">Volunteer Agency</option>
                </select>
            </div>

            <!-- Button -->
            <button type="submit" class="btn btn-success w-100">Register</button>

        </form>

        <p class="text-center mt-3">
            Already have an account?
            <a href="login.html">Login</a>
        </p>

    </div>

</section>

<!-- ================= JS ================= -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="js/main.js"></script>

</body>
</html>
